name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
    

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:ci
